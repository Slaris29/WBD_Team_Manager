<script type="text/babel">
const {useState,useEffect,useMemo,useRef} = React;

const STORAGE_KEY = 'wbd-team-mgr-v3';
const PHOTO_TPL = 'https://images.vrcbaseball.com/pfp/{index}.png';
const POS_LIST = ['P','C','1B','2B','3B','SS','LF','CF','RF','DH'];
const POS_COLOR = {
  P:'#f97316', C:'#a855f7', '1B':'#3b82f6', '2B':'#06b6d4', '3B':'#ec4899',
  SS:'#22c55e', LF:'#eab308', CF:'#14b8a6', RF:'#f43f5e', DH:'#94a3b8',
  OF:'#eab308', IF:'#3b82f6', ALL:'#d946ef'
};
const expandPos = (arr) => {
  const out=[]; (arr||[]).forEach(p=>{
    if(p==='OF') out.push('LF','CF','RF');
    else if(p==='IF') out.push('1B','2B','3B','SS');
    else if(p==='ALL') out.push('C','1B','2B','3B','SS','LF','CF','RF');
    else out.push(p);
  }); return [...new Set(out)];
};

function PlayerPhoto({index,name,size=44}){
  const [err,setErr]=useState(false);
  useEffect(()=>{setErr(false);},[index]);
  const s={width:size,height:size};
  if(!index||err) return <div style={s} className="rounded-lg bg-slate-700/60 flex items-center justify-center text-[10px] text-slate-400 font-bold shrink-0">{index||'—'}</div>;
  return <img src={PHOTO_TPL.replace('{index}',index)} alt={name} loading="lazy" style={s} onError={()=>setErr(true)} className="rounded-lg object-cover shrink-0 bg-slate-800"/>;
}
function PosChip({p}){ const c=POS_COLOR[p]||'#64748b'; return <span className="chip" style={{background:c+'22',color:c,border:'1px solid '+c+'55'}}>{p}</span>; }

function buildInitial(){
  const seed=window.__TEAMS__;
  const teams=seed.map((t,ti)=>({
    id:'t'+ti, manager:t.manager, name:t.name||t.manager,
    players:t.players.map((p,pi)=>({
      id:'t'+ti+'p'+pi, name:p.name, index:p.index||'', region:p.region||'',
      mainPos:p.mainPos||'', subPos:p.subPos||'', allPos:p.allPos||[],
      throwBat:p.throwBat||'', isManager:!!p.isManager

function loadState(){
  try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw){const s=JSON.parse(raw); if(s&&s.teams) return s;} }catch(e){}
  return buildInitial();
}

function App(){
  const [state,setState]=useState(loadState);
  const [tab,setTab]=useState('teams');
  const [selTeam,setSelTeam]=useState(state.myTeam||state.teams[0]?.id||null);
  const saveTimer=useRef(null);
  useEffect(()=>{ if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{ try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){} },400); },[state]);
  const update=(fn)=>setState(s=>{const n=JSON.parse(JSON.stringify(s));fn(n);return n;});
  const tabs=[['teams','팀 · 로스터'],['schedule','경기 일정'],['scout','상대 분석'],['lineup','라인업'],['depth','뎁스차트']];
  return (
    <div className="min-h-screen">
      <header className="glass sticky top-0 z-30 border-b border-slate-800">
        <div className="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
          <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-black text-sm">⚾</div>
          <div className="flex-1"><div className="font-bold text-[15px] leading-tight">WBD 팀 운영 센터</div><div className="text-[11px] text-slate-400">Season 4 · 감독 작전실</div></div>
          <div className="flex items-center gap-1.5">
            <span className="text-[11px] text-slate-400">⭐ 내 팀</span>
            <select className="input text-[12px] py-1" value={state.myTeam||''} onChange={e=>update(s=>{s.myTeam=e.target.value;})}>
              <option value="">— 미지정 —</option>
              {state.teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </select>
          </div>
          <button onClick={()=>{if(confirm('모든 데이터를 초기화하고 드래프트 결과로 되돌립니다. 계속할까요?')){localStorage.removeItem(STORAGE_KEY);setState(buildInitial());}}} className="text-[11px] text-slate-400 hover:text-red-400 border border-slate-700 rounded px-2 py-1">초기화</button>
        </div>
        <div className="max-w-6xl mx-auto px-2 flex gap-1 overflow-x-auto pb-1">
          {tabs.map(([k,label])=>(<button key={k} onClick={()=>setTab(k)} className={"px-3 py-1.5 rounded-t-lg text-[13px] font-semibold whitespace-nowrap "+(tab===k?'bg-slate-800 text-white':'text-slate-400 hover:text-slate-200')}>{label}</button>))}
        </div>
      </header>
      <main className="max-w-6xl mx-auto px-3 py-4">
        {tab==='teams' && <TeamsView state={state} update={update} selTeam={selTeam} setSelTeam={setSelTeam}/>}
        {tab==='schedule' && <ScheduleView state={state} update={update}/>}
        {tab==='scout' && <ScoutView state={state}/>}
        {tab==='lineup' && <LineupView state={state} update={update}/>}
        {tab==='depth' && <DepthView state={state} update={update}/>}
      </main>
      <div className="h-10"/>
    </div>
  );
}

function TeamPicker({state,tid,setTid}){
  return (<div className="flex gap-1.5 mb-4 flex-wrap">
    {state.teams.map(t=>(<button key={t.id} onClick={()=>setTid(t.id)} className={"px-3 py-1.5 rounded-lg text-[13px] font-semibold "+(tid===t.id?'bg-blue-600 text-white':'bg-slate-800/50 text-slate-300 hover:bg-slate-800')+(state.myTeam===t.id?' ring-1 ring-amber-400/60':'')}>{state.myTeam===t.id&&'⭐ '}{t.name}</button>))}
  </div>);
}

// ---------- TEAMS ----------
function TeamsView({state,update,selTeam,setSelTeam}){
  const team=state.teams.find(t=>t.id===selTeam)||state.teams[0];
  const [editP,setEditP]=useState(null);
  const addTeam=()=>update(s=>{const id='t'+Date.now();s.teams.push({id,manager:'새 감독',name:'새 팀',players:[]});});
  const delTeam=(id)=>{if(confirm('이 팀을 삭제할까요?'))update(s=>{s.teams=s.teams.filter(t=>t.id!==id);});};
  const addPlayer=()=>update(s=>{const t=s.teams.find(x=>x.id===team.id);t.players.push({id:'p'+Date.now(),name:'새 선수',index:'',region:'',mainPos:'',subPos:'',allPos:[],throwBat:'',isManager:false});});
  return (
    <div className="grid grid-cols-1 md:grid-cols-[200px_1fr] gap-4">
      <div className="space-y-1">
        {state.teams.map(t=>(<button key={t.id} onClick={()=>setSelTeam(t.id)} className={"w-full text-left px-3 py-2 rounded-lg text-[13px] flex items-center justify-between "+(team.id===t.id?'bg-blue-600/20 border border-blue-500/40':'bg-slate-800/40 hover:bg-slate-800 border border-transparent')}>
          <span className="truncate"><span className="font-semibold">{state.myTeam===t.id&&'⭐ '}{t.name}</span><span className="text-slate-500 text-[11px] ml-1">{t.players.length}명</span></span></button>))}
        <button onClick={addTeam} className="w-full px-3 py-2 rounded-lg text-[13px] text-slate-400 border border-dashed border-slate-700 hover:border-slate-500 hover:text-slate-200">+ 팀 추가</button>
      </div>
      {team && (
      <div className="glass rounded-xl border border-slate-800 p-4">
        <div className="flex items-center gap-2 mb-3">
          <input className="input text-[15px] font-bold flex-1" value={team.name} onChange={e=>update(s=>{s.teams.find(x=>x.id===team.id).name=e.target.value;})}/>
          <input className="input text-[12px] w-32" value={team.manager} placeholder="감독명" onChange={e=>update(s=>{s.teams.find(x=>x.id===team.id).manager=e.target.value;})}/>
          <button onClick={()=>delTeam(team.id)} className="text-[11px] text-slate-500 hover:text-red-400 px-2">팀 삭제</button>
        </div>
        <div className="space-y-1.5">
          {team.players.map(p=>(
            <div key={p.id} className={"flex items-center gap-3 rounded-lg p-2 "+(p.isManager?'bg-indigo-500/10 border border-indigo-500/30':'bg-slate-800/40 hover:bg-slate-800/70')}>
              <PlayerPhoto index={p.index} name={p.name} size={42}/>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  {p.isManager && <span className="chip bg-indigo-500/30 text-indigo-200">감독</span>}
                  <span className="font-semibold text-[14px] truncate">{p.name}</span>
                  {p.region && <span className="text-[10px] text-slate-500">{p.region}</span>}
                  {p.throwBat && <span className="text-[10px] text-amber-400/80">{p.throwBat}</span>}
                </div>
                <div className="flex items-center gap-1 mt-0.5 flex-wrap">
                  {p.mainPos && <PosChip p={p.mainPos}/>}
                  {expandPos(p.allPos).filter(x=>x!==p.mainPos).slice(0,6).map(x=><span key={x} className="chip bg-slate-700/40 text-slate-400">{x}</span>)}
                </div>
              </div>
              <button onClick={()=>setEditP(p)} className="text-[11px] text-slate-400 hover:text-blue-400 px-2">편집</button>
            </div>
          ))}
          <button onClick={addPlayer} className="w-full py-2 rounded-lg text-[13px] text-slate-400 border border-dashed border-slate-700 hover:border-slate-500">+ 선수 추가</button>
        </div>
      </div>)}
      {editP && <PlayerEdit player={editP} team={team} update={update} onClose={()=>setEditP(null)}/>}
    </div>
  );
}

function PlayerEdit({player,team,update,onClose}){
  const [p,setP]=useState({...player,allPos:[...(player.allPos||[])]});
  const save=()=>{update(s=>{const t=s.teams.find(x=>x.id===team.id);const i=t.players.findIndex(x=>x.id===player.id);t.players[i]={...p};});onClose();};
  const del=()=>{if(confirm('이 선수를 로스터에서 제거할까요?')){update(s=>{const t=s.teams.find(x=>x.id===team.id);t.players=t.players.filter(x=>x.id!==player.id);});onClose();}};
  const togglePos=(pos)=>setP(o=>({...o,allPos:o.allPos.includes(pos)?o.allPos.filter(x=>x!==pos):[...o.allPos,pos]}));
  return (
    <div className="fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4" onClick={onClose}>
      <div className="glass rounded-xl border border-slate-700 p-5 w-full max-w-md" onClick={e=>e.stopPropagation()}>
        <div className="flex items-center gap-3 mb-4"><PlayerPhoto index={p.index} name={p.name} size={56}/><div className="text-[15px] font-bold flex-1">{p.name||'선수 편집'}</div>
          <label className="flex items-center gap-1.5 text-[12px] text-slate-300"><input type="checkbox" checked={p.isManager} onChange={e=>setP({...p,isManager:e.target.checked})}/>감독</label></div>
        <div className="space-y-3">
          <Field label="이름"><input className="input w-full" value={p.name} onChange={e=>setP({...p,name:e.target.value})}/></Field>
          <div className="grid grid-cols-2 gap-3">
            <Field label="인덱스 (사진)"><input className="input w-full font-mono" value={p.index} placeholder="예: 134" onChange={e=>setP({...p,index:e.target.value})}/></Field>
            <Field label="투타 (예: 우투좌타)"><input className="input w-full" value={p.throwBat} onChange={e=>setP({...p,throwBat:e.target.value})}/></Field>
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Field label="주 포지션"><select className="input w-full" value={p.mainPos} onChange={e=>setP({...p,mainPos:e.target.value})}><option value="">—</option>{POS_LIST.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
            <Field label="부 포지션"><select className="input w-full" value={p.subPos} onChange={e=>setP({...p,subPos:e.target.value})}><option value="">—</option>{POS_LIST.map(x=><option key={x} value={x}>{x}</option>)}</select></Field>
          </div>
          <Field label="가능 포지션 (복수 선택)"><div className="flex flex-wrap gap-1.5">
            {['P','C','1B','2B','3B','SS','LF','CF','RF','DH','OF','IF','ALL'].map(x=>(<button key={x} onClick={()=>togglePos(x)} className={"chip "+(p.allPos.includes(x)?'':'opacity-40')} style={{background:(POS_COLOR[x]||'#64748b')+'22',color:POS_COLOR[x]||'#94a3b8',border:'1px solid '+(POS_COLOR[x]||'#64748b')+'55',padding:'3px 8px'}}>{x}</button>))}
          </div></Field>
        </div>
        <div className="flex gap-2 mt-5"><button onClick={del} className="text-[12px] text-red-400/80 hover:text-red-400 px-3 py-2">제거</button><div className="flex-1"/><button onClick={onClose} className="text-[13px] text-slate-400 px-4 py-2">취소</button><button onClick={save} className="text-[13px] bg-blue-600 hover:bg-blue-500 rounded-lg px-5 py-2 font-semibold">저장</button></div>
      </div>
    </div>
  );
}

const FIELD_POS = {
  CF:{x:50,y:12}, LF:{x:16,y:25}, RF:{x:84,y:25},

// drag context (module-level, simple)
let DRAG = null; // {name}

function Diamond({children,height}){

function LineupView({state,update}){
  const [tid,setTid]=useState(state.myTeam||state.teams[0]?.id||null);
  const [dragOver,setDragOver]=useState(null);
  const team=state.teams.find(t=>t.id===tid);
  const ensure=(l)=>{ if(!l.field)l.field={}; if(!l.order)l.order=Array(9).fill(''); if(!l.omap)l.omap=Array(9).fill(null); if(!l.bench)l.bench=[]; return l; };
  const lu=ensure(JSON.parse(JSON.stringify(state.lineups[tid]||{})));
  const opts=team?.players||[];
  const findP=(nm)=>opts.find(x=>x.name===nm);
  const setLu=(fn)=>update(s=>{ if(!s.lineups[tid])s.lineups[tid]={}; ensure(s.lineups[tid]); fn(s.lineups[tid]); });

  // 필드에 직접 배치(드롭다운/단일). swap 아님.
  const assignField=(pos,name)=>setLu(l=>{ placeField(l,pos,name); });
  function placeField(l,pos,name){
    l.field[pos]=name;
    let slot=l.omap.indexOf(pos);
    if(!name){ if(slot>=0){ l.order[slot]=''; l.omap[slot]=null; } return; }
    if(slot>=0){ l.order[slot]=name; }
    else {
      if(pos==='DH' && !l.omap[0]){ slot=0; }
      else { slot=l.omap.indexOf(null); if(slot<0) slot=l.order.indexOf(''); }
      if(slot>=0){ l.order[slot]=name; l.omap[slot]=pos; }
    }
  }
  const setOrder=(i,name)=>setLu(l=>{
    l.order[i]=name;
    const pos=l.omap[i];
    if(pos){ if(name) l.field[pos]=name; else { l.field[pos]=''; l.omap[i]=null; } }
  });

  const startDrag=(e,name,origin)=>{ if(!name)return; DRAG={name,origin}; if(e.dataTransfer){e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',name);}catch(_){}} };
  const dropField=(e,pos)=>{ e.preventDefault(); const d=DRAG; DRAG=null; setDragOver(null); if(!d||!d.name)return;
    setLu(l=>{
      const o=d.origin;
      if(o&&o.kind==='field'&&o.key!==pos){ // 필드↔필드 스왑
        const a=l.field[pos]||''; placeField(l,pos,d.name); placeField(l,o.key,a);
      } else { placeField(l,pos,d.name); }
    });
  };
  const dropOrder=(e,i)=>{ e.preventDefault(); const d=DRAG; DRAG=null; setDragOver(null); if(!d||!d.name)return;
    setLu(l=>{
      const o=d.origin;
      if(o&&o.kind==='order'&&o.key!==i){ // 타순↔타순 스왑
        const a=l.order[i]||''; const pa=l.omap[i]; const pb=l.omap[o.key];
        l.order[i]=d.name; l.omap[i]=pb;
        l.order[o.key]=a; l.omap[o.key]=pa;
      } else {
        l.order[i]=d.name; const pos=l.omap[i]; if(pos){ l.field[pos]=d.name; }
      }
    });
  };

  return (<div><TeamPicker state={state} tid={tid} setTid={setTid}/>
    {team && (
    <div className="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-4">
      {/* 필드 */}
      <div className="glass rounded-2xl border border-slate-800 p-3 shadow-xl shadow-black/30">
        <div className="flex items-center gap-2 mb-2 px-1">
          <span className="text-emerald-400">◆</span>
          <div className="font-bold text-[15px]">{team.name}</div>
          <span className="text-slate-500 text-[12px]">수비 배치</span>
          {state.myTeam===tid && <span className="chip bg-amber-500/20 text-amber-300 border border-amber-500/40 ml-auto">⭐ 내 팀</span>}
        </div>
        <Diamond height="520px">
          {Object.entries(FIELD_POS).map(([pos,xy])=>{
            const nm=lu.field[pos]||''; const pl=findP(nm); const c=POS_COLOR[pos];
            const hot=dragOver===('F'+pos);
            return (<div key={pos} className="absolute -translate-x-1/2 -translate-y-1/2" style={{left:xy.x+'%',top:xy.y+'%',width:'132px'}}
              onDragOver={e=>{e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect='move';setDragOver('F'+pos);}} onDragLeave={()=>setDragOver(null)} onDrop={e=>dropField(e,pos)}>
              <div className={"rounded-xl border bg-slate-900/90 p-1.5 transition shadow-lg "+(hot?'ring-2 ring-emerald-400 scale-105':'')} style={{borderColor:c+'66'}}>
                <div className="text-center text-[10px] font-bold tracking-widest mb-1" style={{color:c}}>{pos} · {POS_KR[pos]}</div>
                <div className="flex items-center gap-1.5">
                  <span draggable={!!nm} onDragStart={e=>startDrag(e,nm,{kind:'field',key:pos})} className={"shrink-0 select-none text-slate-500 "+(nm?'cursor-grab active:cursor-grabbing hover:text-slate-300':'opacity-30')} title="드래그">⠿</span>
                  <PlayerPhoto index={pl?.index} name={nm} size={26}/>
                  <select className="bg-transparent text-[11px] text-slate-100 outline-none flex-1 min-w-0 cursor-pointer" value={nm} onChange={e=>assignField(pos,e.target.value)}>
                    <option value="" className="bg-slate-900">—</option>
                    {opts.map(p=><option key={p.id} value={p.name} className="bg-slate-900">{p.name}</option>)}
                  </select>
                </div>
              </div>
            </div>);
          })}
        </Diamond>
        <div className="text-[10px] text-slate-500 text-center mt-1">선수 카드를 끌어 위치·타순에 놓을 수 있어요. DH는 선발 타순에 자동 배치됩니다.</div>
      </div>
      {/* 타순 + 대기 */}
      <div className="space-y-3">
        <div className="glass rounded-2xl border border-slate-800 p-3 shadow-xl shadow-black/30">
          <div className="text-center font-bold text-[13px] tracking-widest text-emerald-300 bg-emerald-500/10 border border-emerald-500/20 rounded-lg py-1.5 mb-2">타순 LINEUP</div>
          <div className="space-y-1.5">
            {[0,1,2,3,4,5,6,7,8].map(i=>{ const nm=lu.order[i]||''; const pl=findP(nm); const hot=dragOver===('O'+i); return (
              <div key={i}
                onDragOver={e=>{e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect='move';setDragOver('O'+i);}} onDragLeave={()=>setDragOver(null)} onDrop={e=>dropOrder(e,i)}
                className={"flex items-center gap-2 bg-slate-800/40 rounded-lg p-1.5 transition "+(hot?'ring-2 ring-emerald-400':'')}>
                <span className="w-6 h-6 shrink-0 rounded-full bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center text-[12px] font-black text-white">{i+1}</span>
                <span draggable={!!nm} onDragStart={e=>startDrag(e,nm,{kind:'order',key:i})} className={"shrink-0 select-none text-slate-500 "+(nm?'cursor-grab active:cursor-grabbing hover:text-slate-300':'opacity-30')} title="드래그">⠿</span>
                <PlayerPhoto index={pl?.index} name={nm} size={28}/>
                <select className="bg-transparent text-[12px] text-slate-100 outline-none flex-1 cursor-pointer" value={nm} onChange={e=>setOrder(i,e.target.value)}>
                  <option value="" className="bg-slate-900">타자 이름</option>{opts.map(p=><option key={p.id} value={p.name} className="bg-slate-900">{p.name}</option>)}
                </select>
              </div>);})}
          </div>
        </div>
        <div className="glass rounded-2xl border border-slate-800 p-3 shadow-xl shadow-black/30">
          <div className="text-center font-bold text-[13px] tracking-widest text-slate-300 bg-slate-700/30 rounded-lg py-1.5 mb-2">대기 / 불펜</div>
          <div className="space-y-1.5"
            onDragOver={e=>{e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect='move';}} onDrop={e=>{e.preventDefault(); const d=DRAG; DRAG=null; setDragOver(null); if(d&&d.name){ setLu(l=>{ if(!l.bench.includes(d.name))l.bench.push(d.name); }); } }}>
            {(lu.bench||[]).map((nm,idx)=>{ const pl=findP(nm); return (
              <div key={idx} className="flex items-center gap-2 bg-slate-800/40 rounded-lg p-1.5">
                <span draggable={!!nm} onDragStart={e=>startDrag(e,nm,{kind:'bench',key:idx})} className={"shrink-0 select-none text-slate-500 "+(nm?'cursor-grab active:cursor-grabbing hover:text-slate-300':'opacity-30')} title="드래그">⠿</span>
                <PlayerPhoto index={pl?.index} name={nm} size={26}/>
                <select className="bg-transparent text-[12px] text-slate-100 outline-none flex-1 cursor-pointer" value={nm} onChange={e=>setLu(l=>{l.bench[idx]=e.target.value;})}>
                  <option value="" className="bg-slate-900">선수 이름</option>{opts.map(p=><option key={p.id} value={p.name} className="bg-slate-900">{p.name}</option>)}
                </select>
                <button onClick={()=>setLu(l=>{l.bench=l.bench.filter((_,i)=>i!==idx);})} className="text-slate-600 hover:text-red-400 text-[12px] px-1">✕</button>
              </div>);})}
            <button onClick={()=>setLu(l=>{l.bench.push('');})} className="w-full py-1.5 rounded-lg text-[12px] text-slate-400 border border-dashed border-slate-700 hover:border-slate-500">+ 추가</button>
          </div>
        </div>
      </div>
    </div>)}
  </div>);
}

function DepthView({state,update}){
  const [tid,setTid]=useState(state.myTeam||state.teams[0]?.id||null);
  const [dragOver,setDragOver]=useState(null);
  const team=state.teams.find(t=>t.id===tid);
  const dc=state.depth[tid]||{};
  const setDepth=(pos,arr)=>update(s=>{ if(!s.depth[tid])s.depth[tid]={}; s.depth[tid][pos]=arr.filter(Boolean); });
  const opts=team?.players||[];
  const findP=(nm)=>opts.find(x=>x.name===nm);
  const mgr=opts.find(p=>p.isManager);
  const suggest=(pos)=>(team?.players||[]).filter(p=>!p.isManager&&expandPos(p.allPos.length?p.allPos:[p.mainPos]).includes(pos)).map(p=>p.name);

  const startDrag=(e,fromPos,fromIdx)=>{ DRAG={fromPos,fromIdx}; if(e.dataTransfer){e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain','x');}catch(_){}} };
  // 행에 드롭: 같은/다른 포지션의 특정 인덱스와 위치 교환(스왑)
  const dropRow=(e,toPos,toIdx)=>{ e.preventDefault(); e.stopPropagation(); const d=DRAG; DRAG=null; setDragOver(null); if(!d)return;
    update(s=>{ const dep=s.depth[tid]||(s.depth[tid]={});
      const from=(dep[d.fromPos]||[]).slice(); const to=(dep[toPos]||[]).slice();
      if(d.fromPos===toPos){ if(d.fromIdx===toIdx)return; const a=from; const t=a[toIdx]; a[toIdx]=a[d.fromIdx]; a[d.fromIdx]=t; dep[toPos]=a.filter(Boolean); }
      else { const mv=from[d.fromIdx]; const tgt=to[toIdx]||''; to[toIdx]=mv; if(tgt) from[d.fromIdx]=tgt; else from.splice(d.fromIdx,1); dep[toPos]=to.filter(Boolean); dep[d.fromPos]=from.filter(Boolean); }
    });
  };
  // 카드 빈 영역에 드롭: 그 포지션 맨 끝에 추가(다른 포지션에서 온 경우 출발지에서 제거)
  const dropCard=(e,toPos)=>{ e.preventDefault(); const d=DRAG; DRAG=null; setDragOver(null); if(!d)return;
    update(s=>{ const dep=s.depth[tid]||(s.depth[tid]={});
      const from=(dep[d.fromPos]||[]).slice(); const mv=from[d.fromIdx]; if(!mv)return;
      if(d.fromPos===toPos)return;
      const to=(dep[toPos]||[]).filter(n=>n&&n!==mv); to.push(mv); dep[toPos]=to;
      from.splice(d.fromIdx,1); dep[d.fromPos]=from.filter(Boolean);
    });
  };

  const SlotCard=({pos})=>{
    const list=dc[pos]||[]; const c=POS_COLOR[pos];
    const starter=list[0]||''; const backups=list.slice(1);
    const hot=dragOver===pos;
    return (
      <div onDragOver={e=>{e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect='move';setDragOver(pos);}} onDragLeave={()=>setDragOver(null)} onDrop={e=>dropCard(e,pos)}
        className={"rounded-2xl border bg-slate-900/90 p-2 shadow-lg transition "+(hot?'ring-2 ring-emerald-400':'')} style={{borderColor:c+'55',width:'186px'}}>
        <div className="text-center text-[11px] font-bold tracking-widest mb-1.5" style={{color:c}}>{pos} · {POS_KR[pos]}</div>
        {/* 주전 = idx 0 */}
        <div onDragOver={e=>{e.preventDefault();}} onDrop={e=>dropRow(e,pos,0)}
          className="rounded-xl border p-1.5 mb-1" style={{borderColor:c+'40',background:c+'12'}}>
          <div className="flex items-center gap-1.5">
            <span draggable={!!starter} onDragStart={e=>startDrag(e,pos,0)} className={"shrink-0 select-none text-slate-500 "+(starter?'cursor-grab active:cursor-grabbing hover:text-slate-300':'opacity-30')} title="드래그">⠿</span>
            <PlayerPhoto index={findP(starter)?.index} name={starter} size={30}/>
            <div className="flex-1 min-w-0">
              <div className="text-[9px] font-bold" style={{color:c}}>주전 · STARTER</div>
              <select className="bg-transparent text-[12px] font-semibold text-slate-100 outline-none w-full cursor-pointer" value={starter} onChange={e=>{const a=[...list]; if(a.length)a[0]=e.target.value; else a.push(e.target.value); setDepth(pos,a);}}>
                <option value="" className="bg-slate-900">—</option>
                {opts.map(p=><option key={p.id} value={p.name} className="bg-slate-900">{p.name}</option>)}
              </select>
            </div>
            {starter && <button onClick={()=>setDepth(pos,list.slice(1))} className="text-slate-600 hover:text-red-400 text-[11px]">✕</button>}
          </div>
        </div>
        {/* 백업 = idx bi+1 */}
        {backups.map((nm,bi)=>(
          <div key={bi} onDragOver={e=>{e.preventDefault();}} onDrop={e=>dropRow(e,pos,bi+1)}
            className="flex items-center gap-1.5 rounded-lg border border-slate-700/50 p-1 mb-1">
            <span draggable onDragStart={e=>startDrag(e,pos,bi+1)} className="shrink-0 select-none text-slate-500 cursor-grab active:cursor-grabbing hover:text-slate-300" title="드래그">⠿</span>
            <span className="text-[9px] text-slate-500 w-4 text-center font-bold">B{bi+1}</span>
            <PlayerPhoto index={findP(nm)?.index} name={nm} size={22}/>
            <span className="text-[11px] text-slate-200 flex-1 truncate">{nm}</span>
            {bi>0 && <button onClick={()=>{const a=[...list];const k=bi+1;[a[k-1],a[k]]=[a[k],a[k-1]];setDepth(pos,a);}} className="text-slate-600 hover:text-slate-300 text-[10px]">▲</button>}
            <button onClick={()=>setDepth(pos,list.filter((_,i)=>i!==bi+1))} className="text-slate-600 hover:text-red-400 text-[10px]">✕</button>
          </div>
        ))}
        <select className="input w-full text-[11px] py-1 mt-0.5 border-dashed" value="" onChange={e=>{if(e.target.value)setDepth(pos,[...list,e.target.value]);}}>
          <option value="">+ 추가</option>
          {opts.filter(p=>!list.includes(p.name)).map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
        </select>
      </div>
    );
  };

  return (<div><TeamPicker state={state} tid={tid} setTid={setTid}/>
    {team && (
    <div className="glass rounded-2xl border border-slate-800 p-3 shadow-xl shadow-black/30">
      <div className="flex items-center justify-between mb-2 px-1 gap-2 flex-wrap">
        <div className="flex items-center gap-2"><span className="text-emerald-400">◆</span><div className="font-bold text-[15px]">{team.name} 뎁스차트</div>{state.myTeam===tid && <span className="chip bg-amber-500/20 text-amber-300 border border-amber-500/40">⭐ 내 팀</span>}</div>
        <button onClick={()=>{if(confirm('가능 포지션 기준으로 자동 채울까요? 기존 뎁스차트를 덮어씁니다.')){update(s=>{s.depth[tid]={};POS_LIST.forEach(pos=>{s.depth[tid][pos]=suggest(pos);});});}}} className="text-[12px] bg-emerald-600/80 hover:bg-emerald-500 rounded-lg px-3 py-1.5 font-semibold">🪄 자동 채우기</button>
      </div>
      <Diamond height="840px">
        {Object.keys(FIELD_POS).map(pos=>{ const xy=FIELD_POS[pos]; return (<div key={pos} className="absolute -translate-x-1/2 -translate-y-1/2" style={{left:xy.x+'%',top:xy.y+'%'}}><SlotCard pos={pos}/></div>); })}
      </Diamond>
      {mgr && (
        <div className="mt-2 flex items-center gap-3 bg-indigo-500/10 border border-indigo-500/30 rounded-2xl p-3 max-w-sm mx-auto">
          <PlayerPhoto index={mgr.index} name={mgr.name} size={48}/>
          <div><div className="chip bg-indigo-500/30 text-indigo-200">👑 감독</div><div className="font-bold text-[15px] mt-0.5">{mgr.name}</div></div>
        </div>
      )}
      <div className="text-[10px] text-slate-500 text-center mt-2">선수 카드를 다른 포지션으로 끌어다 놓으면 백업으로 추가됩니다.</div>
    </div>)}
  </div>);
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
